- baseInfo:
    api_name: 删除购物车商品
    url: /coupApply/cms/delCart
    method: post
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
      token: ${get_extract_data(token)}
  testCase:
    - case_name: 正常删除购物车商品
      data:
        productId: "33809635011"
        timeStamp: ${timestamp()}
      validation:
        - eq: { 'error_code': '0000' }
        - contains: { 'message': 'success' }
    - case_name: 商品ID不存在
      data:
        productId: "99999999999"
        timeStamp: ${timestamp()}
      validation:
        - eq: { 'error_code': '4004' }
        - contains: { 'message': '商品不存在' }